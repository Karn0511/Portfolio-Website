<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta
      name="description"
      content="Senior software engineer specializing in cloud architecture, AI systems, and full-stack development. AWS certified, experienced with enterprise systems."
    />
    <meta
      name="keywords"
      content="software engineer, cloud architecture, AI, full-stack, AWS, Angular, React, Python"
    />
    <meta name="author" content="Ashutosh Karn" />

    <!-- Viewport & Device -->
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f1419" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta property="og:title" content="Ashutosh Karn | Software Engineer" />
    <meta
      property="og:description"
      content="Professional portfolio showcasing cloud architecture, AI systems, and full-stack engineering."
    />
    <meta property="og:type" content="website" />

    <!-- Premium Curated Typefaces -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@100;200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #000511;
      }

      body {
        margin: 0;
        background-color: #000511;
        color: #f1f5f9;
        font-family: "Inter", sans-serif;
        line-height: 1.5;
        overflow-x: hidden;
      }

      /* Reduced motion preferences */
      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(212, 175, 55, 0.2);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: rgba(212, 175, 55, 0.6);
      }
    </style>
  </head>
  <body>
    <app-root></app-root>
  </body>
