<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ashutosh Karn | Software Engineer - AI, Cloud & Full-Stack</title>
    <meta
      name="description"
      content="Senior software engineer specializing in cloud architecture, AI systems, and full-stack development. AWS certified, experienced with enterprise systems."
    />
    <meta
      name="keywords"
      content="software engineer, cloud architecture, AI, full-stack, AWS, Angular, React, Python"
    />
    <meta name="author" content="Ashutosh Karn" />

    <!-- Viewport & Device -->
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f1419" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta property="og:title" content="Ashutosh Karn | Software Engineer" />
    <meta
      property="og:description"
      content="Professional portfolio showcasing cloud architecture, AI systems, and full-stack engineering."
    />
    <meta property="og:type" content="website" />

    <!-- Premium Curated Typefaces -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@100;200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        margin: 0;
        background-color: #0f1419;
        color: #f1f5f9;
        font-family: "Inter", sans-serif;
        line-height: 1.5;
        overflow-x: hidden;
      }

      /* Reduced motion preferences */
      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(212, 175, 55, 0.4);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: rgba(212, 175, 55, 0.8);
      }

      #system-init {
        position: fixed;
        inset: 0;
        background: #0f1419;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
      }

      .startup-container {
        text-align: center;
        position: relative;
      }

      .neural-core {
        width: 80px;
        height: 80px;
        border: 2px solid #d4af37;
        border-radius: 50%;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 2rem;
        animation: pulse-core 2s ease-in-out infinite;
        box-shadow: 0 0 40px rgba(56, 189, 248, 0.4);
      }

      .neural-core::after {
        content: "";
        width: 10px;
        height: 10px;
        background: #fff;
        border-radius: 50%;
        animation: pulse-inner 1s ease-in-out infinite;
      }

      @keyframes pulse-core {
        0%,
        100% {
          transform: scale(1);
          border-color: #38bdf8;
          box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }
        50% {
          transform: scale(1.1);
          border-color: #fff;
          box-shadow: 0 0 50px rgba(56, 189, 248, 0.6);
        }
      }

      @keyframes pulse-inner {
        0%,
        100% {
          opacity: 0.5;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.5);
        }
      }

      .loading-text {
        font-family: "Share Tech Mono", monospace;
        color: #fff;
        font-size: 0.7rem;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        margin-bottom: 1rem;
        opacity: 0.8;
      }

      .progress-container {
        width: 240px;
        height: 1px;
        background: rgba(255, 255, 255, 0.05);
        position: relative;
        overflow: hidden;
      }

      .progress-fill {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, transparent, #38bdf8, transparent);
        animation: loading-scan 1.5s ease-in-out infinite;
      }

      @keyframes loading-scan {
        0% {
          left: -100%;
        }
        100% {
          left: 100%;
        }
      }

      .status-log {
        position: absolute;
        bottom: 2rem;
        left: 2rem;
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.2);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="system-init">
      <div class="startup-container">
        <div class="neural-core"></div>
        <div class="loading-text">INITIALIZING_BIT_STREAM</div>
        <div class="progress-container">
          <div class="progress-fill"></div>
        </div>
      </div>
      <div class="status-log">
        [SYS_KERNEL] :: BOOTING_V3.0.1...<br />
        [NEURAL_LINK] :: CONNECTING_NODES...<br />
        [CORE] :: READY
      </div>
    </div>
    <app-root></app-root>
  </body>
</html>
